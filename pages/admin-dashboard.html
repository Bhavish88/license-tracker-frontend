<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard | DocuVault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body class="dashboard-body admin-dashboard">

    <!-- SIDEBAR (UNCHANGED) -->
    <aside class="sidebar">
      <h2 class="logo">DocuVault</h2>

      <nav class="nav">
        <a href="admin-dashboard.html" class="nav-link active">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>

        <a href="admin-users.html" class="nav-link">
          <i class="fas fa-users"></i>
          <span>Users</span>
        </a>

        <a href="admin-notifications.html" class="nav-link">
          <i class="fas fa-bell"></i>
          <span>Notifications</span>
        </a>

        <a href="admin-settings.html" class="nav-link">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>

        <div class="sidebar-divider"></div>

        <a href="login.html" class="nav-link logout" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <!-- PAGE-SPECIFIC MAIN -->
    <main class="admin-dashboard-main">

      <!-- PAGE-SCOPED HEADER -->
      <div class="admin-dashboard-header">
        <h1>Admin Dashboard</h1>
        <p>System-wide overview and statistics</p>
      </div>

      <!-- ADMIN STATS -->
      <section class="admin-stats">
        <div class="admin-stat-card">
          <h3 id="totalUsers">--</h3>
          <p>Total Users</p>
        </div>

        <div class="admin-stat-card">
          <h3 id="totalCertificates">--</h3>
          <p>Total Certificates</p>
        </div>

        <div class="admin-stat-card">
          <h3 id="totalLicenses">--</h3>
          <p>Total Licenses</p>
        </div>

        <div class="admin-stat-card">
          <h3 id="totalCategories">--</h3>
          <p>Total Categories</p>
        </div>
      </section>

      <!-- STATUS -->
      <section class="admin-status">
        <p id="adminStatusText">Loading system data…</p>
      </section>

      <!-- RECENT ACTIVITY -->
      <section class="card">
        <h2>Recent Activity</h2>
        <ul class="activity-feed" id="recentActivityList">
          <li>Loading recent activity…</li>
        </ul>
      </section>

    </main>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/admin-dashboard.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Users | DocuVault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body class="dashboard-body admin-dashboard">

    <!-- SIDEBAR (UNCHANGED) -->
    <aside class="sidebar">
      <h2 class="logo">DocuVault</h2>

      <nav class="nav">
        <a href="admin-dashboard.html" class="nav-link">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>

        <a href="admin-users.html" class="nav-link active">
          <i class="fas fa-users"></i>
          <span>Users</span>
        </a>

        <a href="admin-notifications.html" class="nav-link">
          <i class="fas fa-bell"></i>
          <span>Notifications</span>
        </a>

        <a href="admin-settings.html" class="nav-link">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>

        <div class="sidebar-divider"></div>

        <a href="login.html" class="nav-link logout" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <!-- PAGE-SPECIFIC MAIN -->
    <main class="admin-users-main">

      <!-- PAGE HEADER -->
      <div class="admin-users-header">
        <h1>Admin – User Management</h1>
        <p>View and manage users, licenses, and certificates.</p>
      </div>

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="users">
          All Users
        </button>
        <button class="filter-btn" data-filter="licenses">
          All Licenses
        </button>
        <button class="filter-btn" data-filter="certificates">
          All Certificates
        </button>
      </div>

      <!-- TABLE -->
      <div class="table-container">
        <table id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

    </main>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/admin-users.js"></script>
  </body>
</html>

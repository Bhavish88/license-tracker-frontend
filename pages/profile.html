<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile | DocuVault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="user-dashboard">

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">DocuVault</h2>

    <nav class="nav">
      <a href="dashboard.html" class="nav-link">
        <i class="fas fa-th-large"></i><span>Dashboard</span>
      </a>

      <a href="upload.html" class="nav-link">
        <i class="fas fa-upload"></i><span>Upload Document</span>
      </a>

      <a href="documents.html" class="nav-link">
        <i class="fas fa-file-alt"></i><span>My Documents</span>
      </a>

      <a href="expiry.html" class="nav-link">
        <i class="fas fa-calendar-check"></i><span>Expiry Tracker</span>
      </a>

      <a href="categories.html" class="nav-link">
        <i class="fas fa-folder"></i><span>Categories</span>
      </a>

      <a href="profile.html" class="nav-link active">
        <i class="fas fa-user"></i><span>Profile</span>
      </a>

      <a href="settings.html" class="nav-link">
        <i class="fas fa-cog"></i><span>Settings</span>
      </a>

      <div class="sidebar-divider"></div>

      <a href="login.html" class="nav-link logout" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="profile-main">

    <div class="page-header">
      <h1>Profile</h1>
      <p>Manage your account information and security settings</p>
    </div>

    <!-- PROFILE INFO CARD -->
    <section class="card">
      <div class="card-header">
        <div class="header-left">
          <div class="avatar">
            <i class="fas fa-user"></i>
          </div>
          <div>
            <h2 id="profileName">Loading...</h2>
            <p class="subtitle">@<span id="profileUsername">loading</span></p>
          </div>
        </div>
        <button id="editBtn" class="btn-edit">
          <i class="fas fa-edit"></i> Edit Profile
        </button>
      </div>

      <form id="profileForm" class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" disabled />
          </div>

          <div class="form-group">
            <label>Username</label>
            <input type="text" disabled />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" disabled />
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" disabled />
          </div>
        </div>

        <div class="form-actions" style="display: none;">
          <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-primary" id="saveBtn">Save Changes</button>
        </div>
      </form>
    </section>

    <!-- SECURITY CARD -->
    <section class="card">
      <div class="card-header-simple">
        <h3>Security Settings</h3>
        <p class="subtitle">Update your password to keep your account secure</p>
      </div>

      <form class="card-body">

        <div class="form-row">
          <div class="form-group password-group">
            <label>Current Password</label>
            <div class="password-wrapper">
              <input type="password" />
              <i class="fas fa-eye toggle-password"></i>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group password-group">
            <label>New Password</label>
            <div class="password-wrapper">
              <input type="password" />
              <i class="fas fa-eye toggle-password"></i>
            </div>
          </div>

          <div class="form-group password-group">
            <label>Confirm New Password</label>
            <div class="password-wrapper">
              <input type="password" />
              <i class="fas fa-eye toggle-password"></i>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" id="updatePasswordBtn">Update Password</button>
        </div>
      </form>
    </section>

  </main>

</div>

<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/profile.js"></script>

</body>
</html>

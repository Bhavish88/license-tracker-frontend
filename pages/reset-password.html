<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DocuVault | Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body class="login-body">
  <div class="login-card">

    <!-- LEFT SIDE -->
    <div class="login-left">
      <div class="left-content">
        <h1>RESET</h1>
        <h2>DocuVault</h2>
        <p>Enter a new password to secure your account.</p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="login-right">
      <div class="form-wrapper">

        <div class="auth-form">
          <h3>Reset Password</h3>

          <form id="resetPasswordForm">
            <div class="form-group password-group">
              <label>New Password</label>
              <div class="password-wrapper">
                <input 
                  type="password" 
                  id="newPassword" 
                  placeholder="Enter new password (min 8 characters)"
                
                />
                <span class="toggle-password" data-target="newPassword">Show</span>
              </div>
            </div>

            <div class="form-group password-group">
              <label>Confirm Password</label>
              <div class="password-wrapper">
                <input 
                  type="password" 
                  id="confirmPassword" 
                  placeholder="Re-enter new password"
                  autocomplete="new-password"
                />
                <span class="toggle-password" data-target="confirmPassword">Show</span>
              </div>
            </div>

            <p class="error-text" id="resetMessage"></p>

            <button type="submit" class="login-btn">
              Update Password
            </button>
          </form>

        </div>

      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/reset-password.js"></script>
</body>
</html>

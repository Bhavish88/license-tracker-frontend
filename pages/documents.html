<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Documents | DocuVault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="user-dashboard">

  <div class="documents-layout">

    <!-- SIDEBAR (UNCHANGED) -->
    <aside class="sidebar">
      <h2 class="logo">DocuVault</h2>

      <nav class="nav">
        <a href="dashboard.html" class="nav-link">
          <i class="fas fa-th-large"></i><span>Dashboard</span>
        </a>

        <a href="upload.html" class="nav-link">
          <i class="fas fa-upload"></i><span>Upload Document</span>
        </a>

        <a href="documents.html" class="nav-link active">
          <i class="fas fa-file-alt"></i><span>My Documents</span>
        </a>

        <a href="expiry.html" class="nav-link">
          <i class="fas fa-calendar-check"></i><span>Expiry Tracker</span>
        </a>

        <a href="categories.html" class="nav-link">
          <i class="fas fa-folder"></i><span>Categories</span>
        </a>

        <a href="profile.html" class="nav-link">
          <i class="fas fa-user"></i><span>Profile</span>
        </a>

        <a href="settings.html" class="nav-link">
          <i class="fas fa-cog"></i><span>Settings</span>
        </a>

        <div class="sidebar-divider"></div>

        <a href="login.html" class="nav-link logout" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i><span>Logout</span>
        </a>
      </nav>
    </aside>

    <!-- MAIN DOCUMENTS CONTENT -->
    <main class="documents-main">

      <!-- HEADER -->
      <header class="documents-header">
        <h1>My Documents</h1>
        <p>Manage and organize all your important documents</p>
      </header>

      <!-- FILTER SECTION -->
      <div class="documents-filter">
        <input type="text" id="searchInput" placeholder="Search documents by name..." />

        <select id="categoryFilter">
          <option value="all">All Categories</option>
        </select>

        <select id="statusFilter">
          <option value="all">All Status</option>
          <option value="Active">Active</option>
          <option value="Expiring">Expiring</option>
          <option value="Expired">Expired</option>
        </select>

        <button id="sortBtn">Sort by Expiry ↑</button>
      </div>

      <p class="count-text" id="countText"></p>

      <!-- DOCUMENT CARDS -->
      <div class="cards-grid" id="documentsGrid"></div>

    </main>

  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/document.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Settings | DocuVault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <script src="../assets/js/auth.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <script src="../assets/js/admin-settings.js" defer></script>
</head>

<body class="dashboard-body admin-dashboard">

  <!-- SIDEBAR (UNCHANGED) -->
  <aside class="sidebar">
    <h2 class="logo">DocuVault</h2>

    <nav class="nav">
      <a href="admin-dashboard.html" class="nav-link">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </a>

      <a href="admin-users.html" class="nav-link">
        <i class="fas fa-users"></i>
        <span>Users</span>
      </a>

      <a href="admin-notifications.html" class="nav-link">
        <i class="fas fa-bell"></i>
        <span>Notifications</span>
      </a>

      <a href="admin-settings.html" class="nav-link active">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>

      <div class="sidebar-divider"></div>

      <a href="login.html" class="nav-link logout" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </a>
    </nav>
  </aside>

  <!-- PAGE-SPECIFIC MAIN -->
  <main class="admin-settings-main">

    <!-- PAGE HEADER -->
    <div class="admin-settings-header">
      <h1>Admin Settings</h1>
      <p>System-level configuration and admin profile overview</p>
    </div>

    <!-- SYSTEM CONFIGURATION -->
    <section class="settings-section">
      <h2>System Configuration</h2>

      <form id="adminSettingsForm" class="settings-form">

        <label>
          Default Notification Reminder Days
          <select id="defaultNotifyDays">
            <option value="7">7 days</option>
            <option value="15">15 days</option>
            <option value="30">30 days</option>
          </select>
        </label>

        <label>
          <input type="checkbox" id="emailNotificationsEnabled" />
          Enable Email Notifications (Global)
        </label>

        <label>
          <input type="checkbox" id="smsNotificationsEnabled" />
          Enable SMS Notifications (Global)
        </label>

        <button type="submit" class="btn-primary">
          Save Settings
        </button>

      </form>
    </section>

    <!-- ADMIN PROFILE (READ-ONLY) -->
    <section class="settings-section">
      <h2>Admin Profile</h2>

      <p><strong>Username:</strong> <span id="adminUsername">—</span></p>
      <p><strong>Email:</strong> <span id="adminEmail">—</span></p>
      <p><strong>Role:</strong> <span id="adminRole">—</span></p>
      <p><strong>Last Login:</strong> <span id="adminLastLogin">—</span></p>
    </section>

  </main>

</body>
</html>

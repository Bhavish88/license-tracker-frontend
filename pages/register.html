<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DocuVault | Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body class="login-body">
  <div class="login-card">

    <!-- LEFT SIDE -->
    <div class="login-left">
      <div class="left-content">
        <h1>WELCOME</h1>
        <h2>DocuVault</h2>
        <p>Create your DocuVault account and keep documents secure.</p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="login-right">
      <div class="form-wrapper">

        <div class="auth-form" id="registerFormBox">
          <h3>Create Account</h3>

          <form id="registerForm">
            <div class="form-group">
              <label>Username</label>
              <input
                type="text"
                id="regUsername"
                placeholder="Choose a username (max 10 characters)"
                maxlength="10"
                autocomplete="username"
              />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                id="regEmail"
                placeholder="Enter your email address"
                autocomplete="email"
              />
            </div>

            <div class="form-group password-group">
              <label>Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="regPassword"
                  placeholder="Minimum 8 characters"
                  autocomplete="new-password"
                />
                <span class="toggle-password" data-target="regPassword">Show</span>
              </div>
            </div>

            <div class="form-group password-group">
              <label>Confirm Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="regConfirmPassword"
                  placeholder="Re-enter your password"
                  autocomplete="new-password"
                />
                <span class="toggle-password" data-target="regConfirmPassword">Show</span>
              </div>
            </div>

            <p class="error-text" id="registerError"></p>

            <button type="submit" class="login-btn">Register</button>
          </form>

          <p class="register-text">
            Already have an account?
            <a href="login.html">Sign in</a>
          </p>
        </div>

      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/register.js"></script>
</body>
</html>
